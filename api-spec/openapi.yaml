openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Manual Service Portal API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: users
    description: User management
  - name: categories
    description: Service categories
  - name: services
    description: Services
  - name: applications
    description: Service applications
  - name: wallet
    description: Wallet and balance management
  - name: notifications
    description: User notifications
  - name: admin
    description: Admin operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/signup:
    post:
      operationId: signup
      tags: [auth]
      summary: Create a new user account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout current user
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users (admin only)
      parameters:
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserListResponse"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update user (admin only)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}/wallet:
    patch:
      operationId: adjustUserWallet
      tags: [users]
      summary: Admin manually adjust user wallet balance
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WalletAdjustment"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all categories
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [categories]
      summary: Create a new category (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /categories/{id}:
    patch:
      operationId: updateCategory
      tags: [categories]
      summary: Update category (admin only)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
    delete:
      operationId: deleteCategory
      tags: [categories]
      summary: Delete category (admin only)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /services:
    get:
      operationId: listServices
      tags: [services]
      summary: List services with optional search and category filter
      parameters:
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: categoryId
          schema:
            type: integer
        - in: query
          name: isActive
          schema:
            type: boolean
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ServiceWithCategory"
    post:
      operationId: createService
      tags: [services]
      summary: Create a new service (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServiceInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceWithCategory"

  /services/{id}:
    get:
      operationId: getService
      tags: [services]
      summary: Get service by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceWithCategory"
    patch:
      operationId: updateService
      tags: [services]
      summary: Update service (admin only)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServiceUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceWithCategory"
    delete:
      operationId: deleteService
      tags: [services]
      summary: Delete service (admin only)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /applications:
    get:
      operationId: listApplications
      tags: [applications]
      summary: List applications (admin gets all, user gets own)
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [pending, processing, success, rejected]
        - in: query
          name: userId
          schema:
            type: integer
        - in: query
          name: serviceId
          schema:
            type: integer
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationListResponse"
    post:
      operationId: createApplication
      tags: [applications]
      summary: Submit a new application
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplicationInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationDetail"

  /applications/{id}:
    get:
      operationId: getApplication
      tags: [applications]
      summary: Get application by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationDetail"
    patch:
      operationId: updateApplication
      tags: [applications]
      summary: Update application status, result, notes (admin only)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplicationUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationDetail"

  /wallet/balance:
    get:
      operationId: getWalletBalance
      tags: [wallet]
      summary: Get current user wallet balance
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalletBalance"

  /wallet/requests:
    get:
      operationId: listWalletRequests
      tags: [wallet]
      summary: List wallet top-up requests (admin gets all, user gets own)
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [pending, approved, rejected]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WalletRequest"
    post:
      operationId: createWalletRequest
      tags: [wallet]
      summary: Submit a wallet top-up request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WalletRequestInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalletRequest"

  /wallet/requests/{id}:
    patch:
      operationId: updateWalletRequest
      tags: [wallet]
      summary: Approve or reject wallet request (admin only)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WalletRequestUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalletRequest"

  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: Get notifications for current user
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"

  /notifications/{id}/read:
    patch:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark a notification as read
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"

  /notifications/read-all:
    patch:
      operationId: markAllNotificationsRead
      tags: [notifications]
      summary: Mark all notifications as read
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Get admin dashboard statistics
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/export/applications:
    get:
      operationId: exportApplications
      tags: [admin]
      summary: Export applications as CSV
      parameters:
        - in: query
          name: status
          schema:
            type: string
      responses:
        "200":
          description: CSV file
          content:
            text/csv:
              schema:
                type: string

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    SignupInput:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
          minLength: 2
        email:
          type: string
        password:
          type: string
          minLength: 6
        phone:
          type: string

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    AuthResponse:
      type: object
      required: [user, token]
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string

    User:
      type: object
      required: [id, name, email, role, walletBalance, isActive, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        phone:
          type: ["string", "null"]
        role:
          type: string
          enum: [user, admin]
        walletBalance:
          type: number
        isActive:
          type: boolean
        createdAt:
          type: string

    UserUpdate:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        isActive:
          type: boolean
        role:
          type: string
          enum: [user, admin]

    UserListResponse:
      type: object
      required: [users, total]
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/User"
        total:
          type: integer

    WalletAdjustment:
      type: object
      required: [amount, note]
      properties:
        amount:
          type: number
        note:
          type: string

    Category:
      type: object
      required: [id, name, icon, order, isActive, serviceCount]
      properties:
        id:
          type: integer
        name:
          type: string
        icon:
          type: string
        order:
          type: integer
        isActive:
          type: boolean
        serviceCount:
          type: integer

    CategoryInput:
      type: object
      required: [name, icon]
      properties:
        name:
          type: string
        icon:
          type: string
        order:
          type: integer

    CategoryUpdate:
      type: object
      properties:
        name:
          type: string
        icon:
          type: string
        order:
          type: integer
        isActive:
          type: boolean

    ServiceWithCategory:
      type: object
      required: [id, name, description, price, icon, isActive, categoryId, categoryName, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        price:
          type: number
        icon:
          type: string
        isActive:
          type: boolean
        categoryId:
          type: integer
        categoryName:
          type: string
        formFields:
          type: ["string", "null"]
        createdAt:
          type: string

    ServiceInput:
      type: object
      required: [name, description, price, icon, categoryId]
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
        icon:
          type: string
        categoryId:
          type: integer
        formFields:
          type: string
        isActive:
          type: boolean

    ServiceUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
        icon:
          type: string
        categoryId:
          type: integer
        formFields:
          type: string
        isActive:
          type: boolean

    ApplicationDetail:
      type: object
      required: [id, userId, serviceId, status, formData, createdAt, updatedAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        userName:
          type: ["string", "null"]
        userEmail:
          type: ["string", "null"]
        serviceId:
          type: integer
        serviceName:
          type: ["string", "null"]
        servicePrice:
          type: ["number", "null"]
        status:
          type: string
          enum: [pending, processing, success, rejected]
        formData:
          type: string
        resultFile:
          type: ["string", "null"]
        resultText:
          type: ["string", "null"]
        adminNotes:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string

    ApplicationInput:
      type: object
      required: [serviceId, formData]
      properties:
        serviceId:
          type: integer
        formData:
          type: string

    ApplicationUpdate:
      type: object
      properties:
        status:
          type: string
          enum: [pending, processing, success, rejected]
        resultFile:
          type: string
        resultText:
          type: string
        adminNotes:
          type: string

    ApplicationListResponse:
      type: object
      required: [applications, total]
      properties:
        applications:
          type: array
          items:
            $ref: "#/components/schemas/ApplicationDetail"
        total:
          type: integer

    WalletBalance:
      type: object
      required: [balance]
      properties:
        balance:
          type: number

    WalletRequest:
      type: object
      required: [id, userId, amount, status, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        userName:
          type: ["string", "null"]
        userEmail:
          type: ["string", "null"]
        amount:
          type: number
        status:
          type: string
          enum: [pending, approved, rejected]
        paymentProof:
          type: ["string", "null"]
        adminNote:
          type: ["string", "null"]
        createdAt:
          type: string

    WalletRequestInput:
      type: object
      required: [amount]
      properties:
        amount:
          type: number
        paymentProof:
          type: string

    WalletRequestUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [approved, rejected]
        adminNote:
          type: string

    Notification:
      type: object
      required: [id, userId, message, isRead, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        message:
          type: string
        type:
          type: string
        isRead:
          type: boolean
        createdAt:
          type: string

    AdminStats:
      type: object
      required: [totalUsers, totalApplications, pendingApplications, processingApplications, successApplications, rejectedApplications, pendingWalletRequests, totalRevenue, totalServices, totalCategories]
      properties:
        totalUsers:
          type: integer
        totalApplications:
          type: integer
        pendingApplications:
          type: integer
        processingApplications:
          type: integer
        successApplications:
          type: integer
        rejectedApplications:
          type: integer
        pendingWalletRequests:
          type: integer
        totalRevenue:
          type: number
        totalServices:
          type: integer
        totalCategories:
          type: integer
